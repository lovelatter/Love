<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width:100%; height:100%; overflow:hidden; background-color:#000; font-family:'Arial',sans-serif; display:flex; justify-content:center; align-items:center; color:#fff; user-select:none; flex-direction:column; }
        #openBtn { font-size:2rem; color:#fff; background:linear-gradient(45deg, #ff4d6d, #ff758f); border:none; padding:16px 40px; border-radius:50px; cursor:pointer; z-index:20; position:relative; transition:transform 0.2s ease; }
        #openBtn::before { content:''; position:absolute; top:-4px; left:-4px; right:-4px; bottom:-4px; border-radius:50px; background:linear-gradient(45deg, #ff4d6d, #ff758f, #ff85a2, #ff4d6d); background-size:400%; z-index:-1; filter:blur(15px); animation:streamingLight 3s linear infinite; }
        @keyframes streamingLight { 0% { background-position:0% 50%; } 50% { background-position:100% 50%; } 100% { background-position:0% 50%; } }
        .blast-out { animation:blastAway 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards !important; pointer-events:none; }
        @keyframes blastAway { 0% { transform:scale(1); opacity:1; filter:blur(0px); } 100% { transform:scale(3); opacity:0; filter:blur(10px); } }
        .text-container { position:absolute; text-align:center; font-size:2.5rem; font-weight:bold; width:90%; max-width:600px; opacity:0; transform:scale(0.95); transition:opacity 0.5s ease, transform 0.5s ease; }
        .text-container::after { content:'|'; animation:blinkCursor 0.6s infinite; color:#ff4d6d; }
        @keyframes blinkCursor { 0%, 100% { opacity:0; } 50% { opacity:1; } }
        .envelope-container { display:none; position:relative; width:320px; height:220px; background-color:#d93654; border-radius:0 0 10px 10px; box-shadow:0 30px 50px rgba(0,0,0,0.6); cursor:pointer; z-index:10; opacity:0; transform:scale(0.8); transition:all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); perspective:1000px; }
        .envelope-flap { position:absolute; top:0; left:0; width:0; height:0; border-left:160px solid transparent; border-right:160px solid transparent; border-top:120px solid #ff4d6d; transform-origin:top; transition:transform 0.6s ease-in-out; z-index:5; filter:drop-shadow(0 4px 5px rgba(0,0,0,0.2)); }
        .envelope-pockets { position:absolute; bottom:0; left:0; width:100%; height:100%; z-index:4; overflow:hidden; border-radius:0 0 10px 10px; }
        .envelope-pockets::before { content:''; position:absolute; bottom:0; left:0; width:0; height:0; border-left:165px solid #ff5c7a; border-top:110px solid transparent; border-bottom:110px solid #ff5c7a; }
        .envelope-pockets::after { content:''; position:absolute; bottom:0; right:0; width:0; height:0; border-right:165px solid #ff5c7a; border-top:110px solid transparent; border-bottom:110px solid #ff5c7a; }
        .envelope-bottom { position:absolute; bottom:0; left:0; width:0; height:0; border-left:160px solid transparent; border-right:160px solid transparent; border-bottom:115px solid #e6425e; z-index:4; border-radius:0 0 10px 10px; }
        .envelope-label { position:absolute; top:130px; left:50%; transform:translateX(-50%); background:#fff; color:#ff4d6d; padding:8px 20px; font-size:1.1rem; font-weight:bold; border-radius:20px; box-shadow:0 5px 15px rgba(0,0,0,0.2); z-index:6; white-space:nowrap; transition:all 0.4s ease; }
        .envelope-heart { position:absolute; top:75px; left:50%; transform:translate(-50%, -50%); font-size:2.2rem; z-index:6; transition:all 0.4s ease; animation:pulseHeart 1.5s infinite; }
        @keyframes pulseHeart { 0%, 100% { transform:translate(-50%, -50%) scale(1); } 50% { transform:translate(-50%, -50%) scale(1.15); } }
        .envelope-container.open .envelope-flap { transform:rotateX(180deg); z-index:1; border-top-color:#ff5c7a; }
        .envelope-container.open .envelope-heart, .envelope-container.open .envelope-label { opacity:0; transform:translate(-50%, -50%) scale(0) !important; }
        
        .love-letter { position:absolute; background:#fff0f5; padding:25px; border-radius:15px; text-align:center; max-width:380px; width:85%; box-shadow:0 15px 40px rgba(0,0,0,0.4); color:#333; z-index:2; transform:translateY(20px) scale(0.85); opacity:0; transition:all 1.2s cubic-bezier(0.1, 1, 0.2, 1); pointer-events:none; }
        .letter-popout { opacity:1 !important; transform:translateY(-50px) scale(1) !important; z-index:12 !important; pointer-events:auto !important; }
        .love-letter h2 { color:#ff4d6d; margin-bottom:10px; font-size:1.8rem; font-family:'Georgia', serif; }
        .love-letter p { font-size:1.05rem; line-height:1.6; color:#444; margin-bottom:15px; white-space: pre-line; }
        
        .question-box { border-top:1px dashed #ff758f; padding-top:15px; margin-top:10px; }
        .question-box h3 { font-size:1.3rem; color:#ff4d6d; margin-bottom:12px; }
        
        .btn-group { display:flex; justify-content:center; align-items:center; gap:25px; min-height: 60px; position: relative; margin-top: 10px; }
        .ask-btn { font-size:1.1rem; font-weight:bold; border:none; padding:10px 30px; border-radius:20px; cursor:pointer; transition:transform 0.2s ease, box-shadow 0.2s ease; color:#fff; height: 42px; }
        .btn-yes { background-color:#2ecc71; box-shadow:0 4px 10px rgba(46,204,113,0.3); z-index: 5; }
        .btn-yes:hover { transform:scale(1.1); box-shadow:0 6px 15px rgba(46,204,113,0.5); }
        .btn-no { background-color:#e74c3c; box-shadow:0 4px 10px rgba(231,76,60,0.3); z-index: 5; }
        
        .heart { position:absolute; color:#ff4d6d; font-size:20px; pointer-events:none; animation:floatUp 4s linear infinite; opacity:0; }
        @keyframes floatUp { 0% { transform:translateY(100vh) scale(0); opacity:0; } 10% { opacity:0.8; } 90% { opacity:0.8; } 100% { transform:translateY(-10vh) scale(1.5); opacity:0; } }
        .fade-in { opacity:1 !important; transform:scale(1) !important; transition:all 0.8s ease; }

        #lockScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050508; z-index: 999; justify-content: center; align-items: center; flex-direction: column; }
        #countdown-box { border: 2px solid #ff4d6d; border-radius: 20px; padding: 30px 20px; background: rgba(0, 0, 0, 0.75); box-shadow: 0 0 25px rgba(255, 77, 109, 0.4); width: 290px; max-width: 85%; text-align: center; box-sizing: border-box; backdrop-filter: blur(5px); }
        .lock-title { font-size: 1.1rem; color: #ffffff; margin-bottom: 20px; letter-spacing: 0.5px; font-weight: 500; }
        #timer-display { font-family: 'Courier New', Courier, monospace; font-size: 1.8rem; color: #ff4d6d; font-weight: bold; line-height: 1.5; text-shadow: 0 0 10px rgba(255, 77, 109, 0.5); }
        #timer-display div { margin: 6px 0; animation: lineFadeIn 0.4s ease-in-out; }
        @keyframes lineFadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <audio id="bgMusic" src="{{MUSIC_SRC}}" loop preload="auto"></audio>
    
    <div id="lockScreen">
        <div id="countdown-box">
            <div class="lock-title">⏳ Waiting for the Special Moment...</div>
            <div id="timer-display"></div>
        </div>
    </div>

    <button id="openBtn">Open ❤️</button>
    <div id="textDisplay" class="text-container"></div>
    <div id="envelope" class="envelope-container">
        <div class="envelope-flap"></div>
        <div class="envelope-pockets"></div>
        <div class="envelope-bottom"></div>
        <div class="envelope-heart">💝</div>
        <div class="envelope-label">খাম খুলুন</div>
    </div>
    
    <div id="loveLetter" class="love-letter">
        <h2 id="letterTitle">{{LETTER_TITLE}}</h2>
        <p id="letterContent">{{LETTER_CONTENT}}</p>
        
        <div class="question-box" id="questionBox">
            <h3>Do you love me? 🥺</h3>
            <div class="btn-group">
                <button class="ask-btn btn-yes" onclick="sendResponse('Yes! I Love You Too ❤️')">Yes</button>
                <button class="ask-btn btn-no" id="noBtn" onmouseover="moveNoButton()" onclick="sendResponse('No 💔')">No</button>
            </div>
        </div>
    </div>

    <script>
        const openBtn = document.getElementById('openBtn'), textDisplay = document.getElementById('textDisplay'), envelope = document.getElementById('envelope'), loveLetter = document.getElementById('loveLetter'), bgMusic = document.getElementById('bgMusic'), noBtn = document.getElementById('noBtn'), questionBox = document.getElementById('questionBox'), lockScreen = document.getElementById('lockScreen');
        
        let textArray = {{{ANIMATION_TEXTS}}};
        let arrayIndex = 0, audioCtx = null;

        const isLocked = {{IS_LOCKED}};
        const targetTime = {{LOCK_TIME}};
        const linkId = "{{LINK_ID}}";

        window.addEventListener('DOMContentLoaded', () => {
            fetch('/api/opened/' + linkId, { method: 'POST' }).catch(e => {});

            if (isLocked && targetTime > Date.now()) {
                handleTimeLock(targetTime);
            }
        });

        function handleTimeLock(targetTime) {
            lockScreen.style.display = 'flex';
            const displayElement = document.getElementById("timer-display");

            const timerInterval = setInterval(() => {
                const now = Date.now();
                const difference = targetTime - now;

                if (difference <= 0) {
                    clearInterval(timerInterval);
                    location.reload();
                    return;
                }

                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                let htmlOutput = "";
                if (hours > 0) {
                    htmlOutput += `<div>${hours} ${hours === 1 ? 'hour' : 'hours'}</div>`;
                }
                if (minutes > 0 || hours > 0) {
                    htmlOutput += `<div>${minutes} ${minutes === 1 ? 'minute' : 'minutes'}</div>`;
                }
                htmlOutput += `<div>${seconds} ${seconds === 1 ? 'second' : 'seconds'}</div>`;

                displayElement.innerHTML = htmlOutput;
            }, 1000);
        }

        function playIphoneTinkSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime, osc1 = audioCtx.createOscillator(), osc2 = audioCtx.createOscillator(), gainNode = audioCtx.createGain(), filter = audioCtx.createBiquadFilter();
                
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(1800, now); osc1.frequency.exponentialRampToValueAtTime(1200, now + 0.01);
                osc2.type = 'triangle'; osc2.frequency.setValueAtTime(300, now); osc2.frequency.exponentialRampToValueAtTime(80, now + 0.015);
                filter.type = 'lowpass'; filter.frequency.setValueAtTime(2500, now);
                gainNode.gain.setValueAtTime(0.9, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.025);
                osc1.connect(filter); osc2.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc1.start(now); osc2.start(now); osc1.stop(now + 0.03); osc2.stop(now + 0.03);
            } catch (e) {}
        }
        
        function typeText(text, charIndex, callback) {
            if (charIndex < text.length) {
                if (text.charAt(charIndex) !== ' ') playIphoneTinkSound();
                textDisplay.innerText += text.charAt(charIndex);
                setTimeout(() => typeText(text, charIndex + 1, callback), 140);
            } else { setTimeout(callback, 1500); }
        }
        
        function startTextSequence() {
            if (arrayIndex < textArray.length) {
                textDisplay.innerText = '';
                textDisplay.classList.remove('fade-out'); textDisplay.classList.add('fade-in');
                typeText(textArray[arrayIndex], 0, () => {
                    textDisplay.classList.remove('fade-in'); textDisplay.classList.add('fade-out');
                    setTimeout(() => { arrayIndex++; startTextSequence(); }, 600);
                });
            } else {
                textDisplay.style.display = 'none'; envelope.style.display = 'block';
                setTimeout(() => envelope.classList.add('fade-in'), 50);
            }
        }
        
        openBtn.addEventListener('click', () => {
            openBtn.classList.add('blast-out');
            
            if(bgMusic.src && bgMusic.src !== window.location.href) {
                bgMusic.volume = 0;
                bgMusic.muted = true;
                bgMusic.play().then(() => {
                    bgMusic.muted = false;
                    bgMusic.volume = 0.001;
                }).catch(e => console.log("Audio unlock retry"));
            }

            setTimeout(() => { openBtn.style.display = 'none'; textDisplay.style.display = 'block'; startTextSequence(); }, 800);
        });
        
        envelope.addEventListener('click', () => {
            envelope.classList.add('open');
            
            if(bgMusic.src && bgMusic.src !== window.location.href) {
                bgMusic.currentTime = 0;
                bgMusic.volume = 1.0;
                bgMusic.play().catch(e => console.log("Final play blocked"));
            }

            setTimeout(() => {
                loveLetter.style.display = 'block';
                setTimeout(() => { loveLetter.classList.add('letter-popout'); setInterval(createHeart, 300); }, 50);
            }, 550);
        });
        
        function createHeart() {
            const heart = document.createElement('div'); heart.classList.add('heart');
            const heartTypes = ['❤️', '💖', '💘', '💕', '💗']; heart.innerText = heartTypes[Math.floor(Math.random() * heartTypes.length)];
            heart.style.left = Math.random() * 100 + 'vw'; heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(heart); setTimeout(() => { heart.remove(); }, 5000);
        }

        function moveNoButton() {
            noBtn.style.position = 'absolute';
            const x = Math.random() * (loveLetter.offsetWidth - noBtn.offsetWidth - 40) + 10;
            const y = Math.random() * (loveLetter.offsetHeight - noBtn.offsetHeight - 180) + 120;
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        function sendResponse(answer) {
            if(answer.includes('Yes')) {
                questionBox.innerHTML = `<h3 style="color:#2ecc71; font-size:1.3rem; margin-top:10px;">আই লাভ ইউ টু! ❤️</h3>`;
            } else {
                questionBox.innerHTML = `<h3 style="color:#e74c3c; font-size:1.3rem; margin-top:10px;">ওহ আচ্ছা... 💔</h3>`;
            }

            fetch('/api/respond/' + linkId, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ response: answer })
            }).catch(error => console.log('Error sending response'));
        }
    </script>
</body>
  </html>
