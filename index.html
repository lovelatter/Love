<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Letter for You</title>
    <style>
        /* বেসিক রিসেট ও ব্যাকগ্রাউন্ড */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0d0d0d;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        /* কাউন্টডাউন ও মেসেজ স্ক্রিন */
        .screen {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }
        .active {
            display: flex;
        }

        /* লক/কাউন্টডাউন স্টাইল */
        #lock-screen h2 {
            font-size: 24px;
            color: #ff4d6d;
            margin-bottom: 20px;
        }
        #timer {
            font-size: 40px;
            font-weight: bold;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* অ্যানিমেশন টেক্সট স্ক্রিন */
        #animation-screen h1 {
            font-size: 28px;
            transition: all 0.5s ease;
            color: #ff758f;
            padding: 0 10px;
        }

        /* 💌 খাম ও মেইন ইন্টারফেস */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            width: 300px;
            height: 200px;
            background-color: #ff4d6d;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .envelope-wrapper:hover {
            transform: scale(1.03);
        }
        /* খামের ওপরের ফ্ল্যাপ */
        .envelope-wrapper::before {
            content: '';
            position: absolute;
            top: -100px;
            left: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 100px solid #ff4d6d;
            transform-origin: bottom;
            transition: transform 0.5s ease 0.3s;
            z-index: 3;
        }
        /* খাম খুললে ফ্ল্যাপ উল্টে যাওয়ার অ্যানিমেশন */
        .envelope-wrapper.open::before {
            transform: rotateX(180deg) translateY(100px);
            border-bottom-color: #ff758f;
            z-index: 1;
        }

        /* 📄 চিঠির ভেতরের কার্ড */
        .love-letter {
            position: absolute;
            top: 5px;
            left: 15px;
            width: 270px;
            background: #fff;
            color: #333;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
            opacity: 0;
            transform: translateY(0);
            max-height: 380px;
            overflow-y: auto;
        }
        /* খাম খুললে চিঠি ওপরে উঠে আসার অ্যানিমেশন */
        .envelope-wrapper.open .love-letter {
            opacity: 1;
            transform: translateY(-220px);
            z-index: 5;
            width: 320px;
            left: -10px;
        }

        /* 📸 ডাইনামিক ইমেজ স্টাইল (যা গোল দাগের স্থানে বসবে) */
        .letter-img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #ff758f;
            margin: 0 auto 15px auto;
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* চিঠির টেক্সট কনটেন্ট */
        .love-letter h2 {
            font-size: 20px;
            color: #ff4d6d;
            margin-bottom: 10px;
            text-align: center;
        }
        .love-letter p {
            font-size: 15px;
            line-height: 1.5;
            color: #555;
            margin-bottom: 15px;
            text-align: center;
        }

        /* অপশন বাটন ও ফিডব্যাক */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-yes { background-color: #4caf50; color: white; }
        .btn-no { background-color: #f44336; color: white; }
        .btn:hover { opacity: 0.9; }
        
        #thanks-msg {
            color: #4caf50;
            font-weight: bold;
            margin-top: 10px;
            display: none;
            text-align: center;
        }

        /* ব্যাকগ্রাউন্ড মিউজিক প্লেয়ার হাইড থাকবে */
        audio { display: none; }
    </style>
</head>
<body>

    <!-- ১. লক স্ক্রিন (কাউন্টডাউন) -->
    <div id="lock-screen" class="screen">
        <h2>🔒 এই চিঠিটি এখনও লক অবস্থায় আছে!</h2>
        <div id="timer">00:00</div>
    </div>

    <!-- ২. অ্যানিমেশন টেক্সট স্ক্রিন -->
    <div id="animation-screen" class="screen active">
        <h1 id="anim-text">চিঠিটি লোড হচ্ছে...</h1>
    </div>

    <!-- ৩. মেইন খাম ও চিঠি স্ক্রিন -->
    <div id="main-screen" class="screen">
        <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
            <!-- ভেতরের চিঠি -->
            <div class="love-letter" onclick="event.stopPropagation();">
                <!-- ছবি থাকলে জাভাস্ক্রিপ্ট দিয়ে ঠিক এই জায়গায় ইমেজ ট্যাগ (letter-img) বসানো হবে -->
                <h2 id="letter-title">আমার মনের কিছু কথা</h2>
                <p id="letter-text">চিঠির মূল বক্তব্য এখানে দেখাবে।</p>
                
                <div id="interaction-zone">
                    <p id="question-text" style="font-weight: bold; color: #333; margin-bottom: 8px;"></p>
                    <div class="btn-group" id="buttons-container"></div>
                    <p id="thanks-msg">✨ ধন্যবাদ আপনার উত্তরের জন্য! ✨</p>
                </div>
            </div>
        </div>
    </div>

    <!-- অডিও এলিমেন্ট -->
    <audio id="bg-music" loop></audio>

    <script>
        // ইউআরএল থেকে আইডেন্টিফায়ার আইডি বের করা
        const linkId = window.location.pathname.split('/').pop();
        let globalData = null;

        // ব্যাকএন্ড API থেকে ডাটা ফেচ করা
        async function loadContent() {
            try {
                const res = await fetch('/api/get-content', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: linkId })
                });
                const data = await res.json();

                if (!data.success) {
                    document.getElementById('anim-text').innerText = "❌ লিঙ্কটি বৈধ নয় বা ডিলিট করা হয়েছে।";
                    return;
                }

                // যদি কাউন্টডাউন লক থাকে
                if (data.isLocked) {
                    switchScreen('lock-screen');
                    startCountdown(data.countdownTime);
                    return;
                }

                globalData = data;
                // অ্যানিমেশন টেক্সট প্রসেস শুরু করা
                startAnimation(data.animations);

            } catch (err) {
                document.getElementById('anim-text').innerText = "⚠️ সার্ভার কানেকশন ত্রুটি!";
            }
        }

        // স্ক্রিন পরিবর্তনের ফাংশন
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // কাউন্টডাউন টাইমার চালুর লজিক
        function startCountdown(targetIsoString) {
            const timerEl = document.getElementById('timer');
            const targetTime = new Date(targetIsoString).getTime();

            const interval = setInterval(() => {
                const now = new Date().getTime();
                const diff = targetTime - now;

                if (diff <= 0) {
                    clearInterval(interval);
                    loadContent(); // লক শেষ হলে আবার কন্টেন্ট লোড করবে
                    return;
                }

                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                timerEl.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // টেক্সট অ্যানিমেশন মেকানিজম
        function startAnimation(lines) {
            const animText = document.getElementById('anim-text');
            let index = 0;

            function showNextLine() {
                if (index < lines.length) {
                    animText.style.opacity = 0;
                    setTimeout(() => {
                        animText.innerText = lines[index];
                        animText.style.opacity = 1;
                        index++;
                        setTimeout(showNextLine, 2500); // প্রতি লাইন আড়াই সেকেন্ড থাকবে
                    }, 500);
                } else {
                    // অ্যানিমেশন শেষ হলে মেইন খামের স্ক্রিনে নিয়ে যাওয়া
                    setupMainEnvelope();
                    switchScreen('main-screen');
                }
            }
            showNextLine();
        }

        // খাম ও চিঠির ডাটা সেটআপ (ছবি হ্যান্ডলিংসহ)
        function setupMainEnvelope() {
            if (!globalData) return;

            const letterCard = document.querySelector('.love-letter');
            const titleEl = document.getElementById('letter-title');

            // 📸 গোল দাগ দেওয়া জায়গায় ছবি যোগ করার মেইন লজিক
            if (globalData.image) {
                // আগের কোনো ছবি থাকলে তা রিমুভ করা (ডুপ্লিকেট এড়াতে)
                const oldImg = letterCard.querySelector('.letter-img');
                if (oldImg) oldImg.remove();

                // নতুন ইমেজ ট্যাগ তৈরি করা
                const imgEl = document.createElement('img');
                imgEl.src = globalData.image;
                imgEl.className = 'letter-img';
                
                // টাইটেলের ঠিক উপরে ইমেজটি পুশ করা
                letterCard.insertBefore(imgEl, titleEl);
            }

            // টেক্সট ও টাইটেল সেট করা
            titleEl.innerText = globalData.title;
            document.getElementById('letter-text').innerText = globalData.letter;

            // মিউজিক সেটআপ
            if (globalData.music) {
                const audio = document.getElementById('bg-music');
                audio.src = globalData.music;
            }

            // প্রশ্ন ও বাটন সেটআপ
            document.getElementById('question-text').innerText = globalData.question;
            const btnContainer = document.getElementById('buttons-container');
            btnContainer.innerHTML = '';

            globalData.buttons.forEach(btnLabel => {
                const btn = document.createElement('button');
                btn.innerText = btnLabel;
                btn.className = `btn ${btnLabel.toLowerCase() === 'no' ? 'btn-no' : 'btn-yes'}`;
                btn.onclick = () => submitAnswer(btnLabel);
                btnContainer.appendChild(btn);
            });
        }

        // খাম খোলার ফাংশন
        function openEnvelope() {
            const envelope = document.getElementById('envelope');
            if (!envelope.classList.contains('open')) {
                envelope.classList.add('open');
                
                // মিউজিক চালু করা
                const audio = document.getElementById('bg-music');
                if (audio.src) {
                    audio.play().catch(e => console.log("Music play blocked by browser settings."));
                }
            }
        }

        // উত্তর সাবমিট করার ফাংশন
        async function submitAnswer(selectedAnswer) {
            try {
                await fetch('/api/submit-answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: linkId, answer: selectedAnswer })
                });
                
                // বাটন লুকিয়ে থ্যাংকস মেসেজ দেখানো
                document.getElementById('buttons-container').style.display = 'none';
                document.getElementById('question-text').style.display = 'none';
                document.getElementById('thanks-msg').style.display = 'block';
            } catch (err) {
                alert("উত্তর পাঠাতে সমস্যা হয়েছে। আবার চেষ্টা করুন।");
            }
        }

        // পেজ লোড হলেই প্রসেস স্টার্ট হবে
        window.onload = loadContent;
    </script>
</body>
</html>
