<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Wishing Box ✨</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; transition: background 1s ease;
        }
        /* 🎨 থিম কালার প্যালেট */
        body.theme-classic { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #ff4b72; }
        body.theme-neon { background: #0f0c1b; color: #00ffcc; }
        body.theme-gold { background: linear-gradient(135deg, #111 0%, #443410 100%); color: #ffd700; }
        body.theme-dark { background: #1a0505; color: #ff3333; }

        .container { text-align: center; width: 90%; max-width: 500px; padding: 30px; border-radius: 20px; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        body.theme-neon .container { border: 2px solid #00ffcc; box-shadow: 0 0 20px #00ffcc; }

        /* ⏰ কাউন্টডাউন ডিজাইন */
        .timer-box { font-size: 2.5rem; font-weight: bold; margin-top: 20px; letter-spacing: 2px; }
        
        .btn { padding: 12px 30px; font-size: 1.1rem; border: none; border-radius: 25px; cursor: pointer; margin-top: 20px; font-weight: bold; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        body.theme-neon .btn { background: #00ffcc; color: #000; }

        /* 💌 এনভেলাপ ও টেক্সট */
        #animation-text { font-size: 1.8rem; font-weight: bold; min-height: 60px; margin-bottom: 20px; }
        #envelope-wrapper { display: none; cursor: pointer; font-size: 5rem; animation: float 2s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        #letter-box { display: none; background: #fff; color: #333; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: left; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body class="theme-classic">

    <div class="container">
        <!-- লকড কাউন্টডাউন স্ক্রিন -->
        <div id="lock-screen" style="display: none;">
            <h2>⏳ Waiting for the Special Moment...</h2>
            <div class="timer-box" id="countdown-clock">00:00:00:00</div>
        </div>

        <!-- উইশিং পেজ স্ক্রিন -->
        <div id="wish-screen" style="display: none;">
            <div id="animation-text">Loading surprise...</div>
            <div id="envelope-wrapper" onclick="openEnvelope()">💌</div>
            
            <div id="letter-box">
                <p id="main-letter-text"></p>
                <input type="text" id="user-response" placeholder="Type your reply here..." style="width:100%; padding:10px; margin-top:15px; border-radius:5px; border:1px solid #ccc;">
                <button class="btn" onclick="sendReply()">Send Reply ❤️</button>
            </div>
        </div>
    </div>

    <!-- ফ্রি মিউজিক সোর্স প্লেয়ার লিংক -->
    <audio id="bg-music" loop></audio>

    <script>
        const linkId = window.location.pathname.split('/').pop();
        let animationLines = [];
        let currentLineIdx = 0;

        // মিউজিক ট্র‍্যাক লাইব্রেরি
        const musicTracks = {
            romantic: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", // এক্সাম্পল প্রফেশনাল বাঁশির সুর যোগ করতে পারবেন
            birthday: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            piano: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
        };

        fetch('/api/get-content', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: linkId })
        })
        .then(res => res.json())
        .then(data => {
            if(!data.success) return alert("Link Expired or Invalid!");

            // থিম সেট করা
            if(data.theme) document.body.className = 'theme-' + data.theme;

            // যদি লিঙ্কটি এখনো লক থাকে (কাউন্টডাউন চলছে)
            if(data.isLocked) {
                document.getElementById('lock-screen').style.display = 'block';
                startCountdownClock(data.targetTime);
            } else {
                // লিঙ্ক আনলকড থাকলে উইশ স্ক্রিন লোড হবে
                document.getElementById('wish-screen').style.display = 'block';
                animationLines = data.animations || [];
                document.getElementById('main-letter-text').innerText = data.letter || '';
                
                // মিউজিক অটো-প্লে সেটআপ
                if(data.music && musicTracks[data.music]) {
                    const audio = document.getElementById('bg-music');
                    audio.src = musicTracks[data.music];
                    audio.play().catch(() => {
                        // ব্রাউজার পলিসির জন্য ইউজার স্ক্রিনে ফার্স্ট ক্লিক করলেই গান বাজবে
                        document.body.addEventListener('click', () => audio.play(), { once: true });
                    });
                }
                showAnimations();
            }
        });

        // লাইভ কাউন্টডাউন ফাংশন
        function startCountdownClock(targetStr) {
            const targetDate = new Date(targetStr.replace(' ', 'T') + ':00').getTime();
            const interval = setInterval(() => {
                const now = new Date().getTime();
                const diff = targetDate - now;

                if (diff <= 0) {
                    clearInterval(interval);
                    location.reload(); // টাইম শেষ হলে পেজটি অটো রিলোড হয়ে আনলক হবে
                    return;
                }

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('countdown-clock').innerText = 
                    `${days}d ${hours}h ${minutes}m ${seconds}s`;
            }, 1000);
        }

        // অ্যানিমেশন টেক্সট শো করার লজিক
        function showAnimations() {
            if(currentLineIdx < animationLines.length) {
                document.getElementById('animation-text').innerText = animationLines[currentLineIdx];
                currentLineIdx++;
                setTimeout(showAnimations, 3000); // প্রতি ৩ সেকেন্ড পর পর লাইন পরিবর্তন হবে
            } else {
                document.getElementById('animation-text').style.display = 'none';
                document.getElementById('envelope-wrapper').style.display = 'block';
            }
        }

        function openEnvelope() {
            document.getElementById('envelope-wrapper').style.display = 'none';
            document.getElementById('letter-box').style.display = 'block';
        }

        function sendReply() {
            const reply = document.getElementById('user-response').value;
            if(!reply.trim()) return alert("Please type something!");
            fetch('/api/respond', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: linkId, response: reply })
            }).then(() => {
                alert("Reply sent successfully! ❤️");
                document.getElementById('user-response').value = '';
            });
        }
    </script>
</body>
</html>
