<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বিশেষ বার্তা</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        /* টাইমার স্ক্রিন */
        #timer-screen {
            display: none;
            text-align: center;
            z-index: 10;
        }
        #countdown {
            font-size: 3rem;
            color: #ff4a5a;
            margin-top: 15px;
            font-weight: bold;
        }

        /* মূল খাম ও চিঠির অংশ */
        #main-content {
            display: none;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            z-index: 5;
        }

        /* এনিমেশন টেক্সট বক্স */
        #animation-text-box {
            font-size: 1.8rem;
            min-height: 80px;
            color: #ffb3c1;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,179,193,0.5);
        }

        /* কার্ড / খাম ডিজাইন */
        .card {
            background: #fff0f3;
            color: #333;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(255, 74, 90, 0.3);
            border: 2px solid #ffccd5;
            display: none;
        }
        .card h2 {
            color: #ff4a5a;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        .letter-body {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            white-space: pre-wrap;
            color: #4a4a4a;
        }

        /* প্রশ্ন ও বাটন এরিয়া */
        .question-text {
            font-size: 1.2rem;
            color: #ff4a5a;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            color: #fff;
        }
        .action-btn:active {
            transform: scale(0.95);
        }
        .btn-yes { background-color: #2ecc71; }
        .btn-no { background-color: #e74c3c; }
        .btn-single { background-color: #9b59b6; width: 80%; }

        /* ধন্যবাদ বার্তা */
        #thanks-msg {
            display: none;
            font-size: 1.3rem;
            color: #2ecc71;
            font-weight: bold;
            margin-top: 15px;
        }

        /* ইমোজি ফ্লোটিং অ্যানিমেশন */
        .floating-emoji {
            position: absolute;
            bottom: -50px;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 4s linear forwards;
            z-index: 1;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) scale(0.5);
                opacity: 0;
            }
            10% { opacity: 1; }
            100% {
                transform: translateY(-105vh) translateX(var(--random-x)) scale(1.2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- ১. কাউন্টডাউন স্ক্রিন -->
    <div id="timer-screen">
        <h2>লিঙ্কটি খুলতে কিছুটা সময় অপেক্ষা করুন...</h2>
        <div id="countdown">00:00</div>
    </div>

    <!-- ২. মূল কন্টেন্ট স্ক্রিন -->
    <div id="main-content">
        <!-- অ্যানিমেশন টেক্সট শো করার জায়গা -->
        <div id="animation-text-box" id="anim-txt"></div>

        <!-- চিঠি এবং প্রশ্ন বাটন এরিয়া -->
        <div class="card" id="letter-card">
            <h2 id="letter-title">আমার হৃদয়ের কথা...</h2>
            <div class="letter-body" id="letter-text"></div>
            <hr style="border: 0; border-top: 1px dashed #ffccd5; margin-bottom: 20px;">
            
            <!-- ডায়নামিক কোশ্চেন -->
            <div class="question-text" id="dynamic-question">Do you love me? 🥺</div>
            
            <!-- ডায়নামিক বাটন এরিয়া -->
            <div class="btn-container" id="dynamic-buttons"></div>
            
            <!-- থ্যাংক ইউ মেসেজ -->
            <div id="thanks-msg">আপনার উত্তরটি সফলভাবে পাঠানো হয়েছে! ❤️</div>
        </div>
    </div>

    <!-- অডিও প্লেয়ার -->
    <audio id="bg-music" loop></audio>

    <script>
        // ইউআরএল থেকে লিঙ্কের আইডি নেওয়া
        const linkId = window.location.pathname.split('/').pop();
        let globalEmojis = ["❤️", "💖", "💕"]; // ডিফল্ট ইমোজি

        // পেজ লোড হলেই ব্যাকএন্ড থেকে ডেটা আনা
        async function loadContent() {
            try {
                const response = await axios.post('/api/get-content', { id: linkId });
                const data = response.data;

                if (!data.success) {
                    alert("লিঙ্কটি সঠিক নয় অথবা বাতিল করা হয়েছে।");
                    return;
                }

                // ১. যদি লিঙ্ক লক করা থাকে (টাইমার সচল থাকে)
                if (data.isLocked) {
                    document.getElementById('timer-screen').style.display = 'block';
                    startTimer(data.countdownTime);
                    return;
                }

                // ২. টাইমার না থাকলে বা শেষ হলে মূল কন্টেন্ট দেখানো
                document.getElementById('timer-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';

                // ব্যাকএন্ড থেকে ইমোজি সেট করা
                if(data.emojis && data.emojis.length > 0) {
                    globalEmojis = data.emojis;
                }

                // ইমোজি ওড়ার অ্যানিমেশন চালু করা
                setInterval(createFloatingEmoji, 400);

                // মিউজিক প্লে করা
                if (data.music) {
                    const audio = document.getElementById('bg-music');
                    audio.src = data.music;
                    audio.play().catch(() => {
                        // ব্রাউজার অটো-প্লে ব্লক করলে স্ক্রিনে কোথাও ক্লিক করলে প্লে হবে
                        document.body.addEventListener('click', () => audio.play(), { once: true });
                    });
                }

                // অ্যানিমেশন টেক্সট চালানো
                if (data.animations && data.animations.length > 0) {
                    runAnimationTexts(data.animations, () => {
                        // অ্যানিমেশন শেষ হলে চিঠি এবং বাটন দেখানো হবে
                        showLetterAndButtons(data);
                    });
                } else {
                    showLetterAndButtons(data);
                }

            } catch (err) {
                console.error(err);
            }
        }

        // টাইমার কাউন্টডাউন ফাংশন
        function startTimer(targetIsoString) {
            const countdownEl = document.getElementById('countdown');
            
            const interval = setInterval(() => {
                const now = new Date().getTime();
                const target = new Date(targetIsoString).getTime();
                const difference = target - now;

                if (difference <= 0) {
                    clearInterval(interval);
                    loadContent(); // টাইমার শেষ হলে আবার কন্টেন্ট লোড করো
                    return;
                }

                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                countdownEl.innerText = `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            }, 1000);
        }

        // অ্যানিমেশন টেক্সট একটার পর একটা দেখানোর লজিক
        function runAnimationTexts(texts, callback) {
            const textBox = document.getElementById('animation-text-box');
            let index = 0;

            function showNext() {
                if (index < texts.length) {
                    textBox.innerText = texts[index];
                    textBox.style.opacity = 1;
                    index++;
                    setTimeout(() => {
                        textBox.style.opacity = 0;
                        setTimeout(showNext, 500);
                    }, 2500); // প্রতি টেক্সট আড়াই সেকেন্ড থাকবে
                } else {
                    textBox.style.display = 'none';
                    callback();
                }
            }
            showNext();
        }

        // চিঠি ও বাটন তৈরি করা
        function showLetterAndButtons(data) {
            document.getElementById('letter-text').innerText = data.letter;
            document.getElementById('dynamic-question').innerText = data.question;
            
            const btnContainer = document.getElementById('dynamic-buttons');
            btnContainer.innerHTML = ''; // ক্লিয়ার করা

            // বাটন সংখ্যা অনুযায়ী ক্লাস নির্ধারণ করা
            data.buttons.forEach(btnText => {
                const btn = document.createElement('button');
                btn.innerText = btnText;
                btn.className = 'action-btn';
                
                if (data.buttons.length === 1) {
                    btn.classList.add('btn-single');
                } else {
                    if (btnText.toLowerCase() === 'yes') btn.classList.add('btn-yes');
                    else if (btnText.toLowerCase() === 'no') btn.classList.add('btn-no');
                    else btn.classList.add('btn-single');
                }

                // বাটনে ক্লিক করলে উত্তর সাবমিট হবে
                btn.onclick = () => submitAnswer(btnText);
                btnContainer.appendChild(btn);
            });

            document.getElementById('letter-card').style.display = 'block';
        }

        // উত্তর সাবমিট করার ফাংশন (যা বটের কাছে মেসেজ পাঠাবে)
        async function submitAnswer(selectedAns) {
            try {
                const response = await axios.post('/api/submit-answer', {
                    id: linkId,
                    answer: selectedAns
                });
                
                if(response.data.success) {
                    document.getElementById('dynamic-buttons').style.display = 'none';
                    document.getElementById('thanks-msg').style.display = 'block';
                }
            } catch (err) {
                alert("উত্তর পাঠাতে ত্রুটি হয়েছে। আবার চেষ্টা করুন।");
            }
        }

        // নিচ থেকে ডায়নামিক ইমোজি ওড়ার ফাংশন
        function createFloatingEmoji() {
            const emoji = document.createElement('div');
            emoji.className = 'floating-emoji';
            
            // গ্লোবাল ইমোজি লিস্ট থেকে র্যান্ডম ইমোজি নেওয়া
            const randomEmoji = globalEmojis[Math.floor(Math.random() * globalEmojis.length)];
            emoji.innerText = randomEmoji;
            
            // স্ক্রিনের র্যান্ডম পজিশন সেট করা
            emoji.style.left = Math.random() * 100 + "vw";
            emoji.style.setProperty('--random-x', (Math.random() * 200 - 100) + "px");
            
            // সাইজ র্যান্ডম করা
            const size = Math.random() * 20 + 20;
            emoji.style.fontSize = size + "px";
            
            document.body.appendChild(emoji);
            
            // ৪ সেকেন্ড পর অ্যানিমেশন শেষে রিমুভ করা
            setTimeout(() => { emoji.remove(); }, 4000);
        }

        // স্ক্রিপ্ট লোড করার জন্য Axios এড করা (যদি প্রজেক্টে না থাকে)
        const script = document.createElement('script');
        script.src = "https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js";
        script.onload = loadContent;
        document.head.appendChild(script);

    </script>
</body>
</html>
