<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Letter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1a1a1a;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* স্ক্রিন ম্যানেজমেন্ট */
        .screen {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .active { display: flex; }

        /* লক/কাউন্টডাউন স্ক্রিন */
        #timer {
            font-size: 48px;
            font-weight: bold;
            color: #ff4d6d;
            margin-top: 20px;
        }

        /* টাইপিং অ্যানিমেশন টেক্সট */
        .typing-container {
            font-size: 24px;
            color: #ff758f;
            min-height: 40px;
            text-align: center;
            padding: 0 20px;
            border-right: 3px solid #ff758f;
            white-space: pre-wrap;
            animation: blink 0.75s step-end infinite;
        }
        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #ff758f; }
        }

        /* 💌 অরিজিনাল খাম ডিজাইন */
        .envelope-container {
            position: relative;
            width: 320px;
            height: 220px;
            background-color: #ff4d6d;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .envelope-container:hover {
            transform: scale(1.02);
        }
        /* খামের ওপরের ফ্ল্যাপ (ত্রিভুজ) */
        .envelope-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 120px solid #ff758f;
            transform-origin: top;
            transition: transform 0.5s ease 0.2s;
            z-index: 3;
        }
        .envelope-container.open::before {
            transform: rotateX(180deg) translateY(0);
            z-index: 1;
        }

        /* 📄 চিঠির কার্ড */
        .love-letter {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 300px;
            background: #ffffff;
            color: #333333;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
            opacity: 0;
            transform: translateY(0);
            max-height: 400px;
            overflow-y: auto;
        }
        .envelope-container.open .love-letter {
            opacity: 1;
            transform: translateY(-260px);
            z-index: 5;
            width: 340px;
            left: -10px;
        }

        /* 📸 ডাইনামিক রাউন্ড ইমেজ */
        .letter-img {
            width: 105px;
            height: 105px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #ff758f;
            margin: 0 auto 15px auto;
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .love-letter h2 {
            font-size: 22px;
            color: #ff4d6d;
            margin-bottom: 12px;
            text-align: center;
        }
        .love-letter p {
            font-size: 16px;
            line-height: 1.6;
            color: #444;
            margin-bottom: 15px;
            text-align: center;
        }

        /* বাটন ও ফিডব্যাক */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
        }
        .btn {
            padding: 8px 22px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }
        .btn-yes { background-color: #4caf50; color: white; }
        .btn-no { background-color: #f44336; color: white; }
        #thanks-msg {
            color: #4caf50;
            font-weight: bold;
            text-align: center;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- ১. লক স্ক্রিন -->
    <div id="lock-screen" class="screen">
        <h2>🔒 এই চিঠিটি দেখতে অপেক্ষা করুন</h2>
        <div id="timer">00:00</div>
    </div>

    <!-- ২. অ্যানিমেশন ও টাইপিং স্ক্রিন -->
    <div id="animation-screen" class="screen active">
        <div class="typing-container" id="typing-text"></div>
    </div>

    <!-- ৩. মেইন খাম ও চিঠি স্ক্রিন -->
    <div id="main-screen" class="screen">
        <div class="envelope-container" id="envelope" onclick="openEnvelope()">
            <div class="love-letter" onclick="event.stopPropagation();">
                <!-- ছবি আপলোড করা থাকলে জাভাস্ক্রিপ্ট দিয়ে এখানে ইমেজ বসবে -->
                <div id="img-holder"></div>
                <h2 id="letter-title"></h2>
                <p id="letter-text"></p>
                
                <div id="action-zone">
                    <p id="question-text" style="font-weight: bold; text-align: center; margin-bottom: 8px;"></p>
                    <div class="btn-group" id="btn-container"></div>
                    <p id="thanks-msg">✨ ধন্যবাদ আপনার উত্তরের জন্য! ✨</p>
                </div>
            </div>
        </div>
    </div>

    <!-- টাইপিং সাউন্ড এবং ব্যাকগ্রাউন্ড মিউজিক (ফ্রি সোর্স অডিও) -->
    <audio id="typing-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>
    <audio id="bg-music" loop></preload></audio>

    <script>
        const linkId = window.location.pathname.split('/').pop();
        let letterData = null;

        // ব্যাকএন্ড API থেকে ডাটা আনা
        async function fetchLetterData() {
            try {
                const response = await fetch('/api/get-content', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: linkId })
                });
                const data = await response.json();

                if (!data.success) {
                    document.getElementById('typing-text').innerText = "❌ লিঙ্কটি সঠিক নয়!";
                    return;
                }

                if (data.isLocked) {
                    showScreen('lock-screen');
                    runTimer(data.countdownTime);
                    return;
                }

                letterData = data;
                startTypingAnimation(data.animations);

            } catch (err) {
                document.getElementById('typing-text').innerText = "⚠️ সার্ভার ত্রুটি! আবার চেষ্টা করুন।";
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // টাইমার ফাংশন
        function runTimer(targetTimeStr) {
            const timer = document.getElementById('timer');
            const target = new Date(targetTimeStr).getTime();

            const interval = setInterval(() => {
                const now = new Date().getTime();
                const diff = target - now;

                if (diff <= 0) {
                    clearInterval(interval);
                    fetchLetterData();
                    return;
                }
                const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((diff % (1000 * 60)) / 1000);
                timer.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // 🎵 টাইপিং অ্যানিমেশন + সাউন্ড ইফেক্ট লজিক
        function startTypingAnimation(lines) {
            const textEl = document.getElementById('typing-text');
            const sound = document.getElementById('typing-sound');
            let lineIdx = 0;

            function typeLine() {
                if (lineIdx < lines.length) {
                    let currentLine = lines[lineIdx];
                    let charIdx = 0;
                    textEl.innerText = "";

                    function typeChar() {
                        if (charIdx < currentLine.length) {
                            textEl.innerText += currentLine[charIdx];
                            charIdx++;
                            
                            // প্রতি ক্যারেক্টারে সাউন্ড প্লে
                            sound.currentTime = 0;
                            sound.play().catch(() => {});
                            
                            setTimeout(typeChar, 100); // টাইপিং স্পিড
                        } else {
                            setTimeout(() => {
                                lineIdx++;
                                typeLine();
                            }, 1500); // এক লাইনের পর বিরতি
                        }
                    }
                    typeChar();
                } else {
                    // অ্যানিমেশন শেষ হলে মেইন ইন্টারফেস রেডি করা
                    setupEnvelopeUI();
                    showScreen('main-screen');
                }
            }
            typeLine();
        }

        // খাম ও চিঠির ভেতরের ডাটা এবং ছবির রেন্ডারিং
        function setupEnvelopeUI() {
            if (!letterData) return;

            // 📸 গোল দাগের জায়গায় ছবি রেন্ডার করার লজিক
            const imgHolder = document.getElementById('img-holder');
            imgHolder.innerHTML = ''; 
            if (letterData.image) {
                const img = document.createElement('img');
                img.src = letterData.image;
                img.className = 'letter-img';
                imgHolder.appendChild(img);
            }

            document.getElementById('letter-title').innerText = letterData.title;
            document.getElementById('letter-text').innerText = letterData.letter;

            if (letterData.music) {
                document.getElementById('bg-music').src = letterData.music;
            }

            // ইন্টারঅ্যাকশন বাটন
            document.getElementById('question-text').innerText = letterData.question;
            const btnContainer = document.getElementById('btn-container');
            btnContainer.innerHTML = '';

            letterData.buttons.forEach(label => {
                const btn = document.createElement('button');
                btn.innerText = label;
                btn.className = `btn ${label.toLowerCase() === 'no' ? 'btn-no' : 'btn-yes'}`;
                btn.onclick = () => sendResponse(label);
                btnContainer.appendChild(btn);
            });
        }

        function openEnvelope() {
            const env = document.getElementById('envelope');
            if (!env.classList.contains('open')) {
                env.classList.add('open');
                const bgMusic = document.getElementById('bg-music');
                if (bgMusic.src) bgMusic.play().catch(() => {});
            }
        }

        async function sendResponse(ans) {
            try {
                await fetch('/api/submit-answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: linkId, answer: ans })
                });
                document.getElementById('btn-container').style.display = 'none';
                document.getElementById('question-text').style.display = 'none';
                document.getElementById('thanks-msg').style.display = 'block';
            } catch (err) {
                alert("উত্তরে সমস্যা হয়েছে, আবার চেষ্টা করুন।");
            }
        }

        window.onload = fetchLetterData;
    </script>
</body>
</html>
