<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Message For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        /* Card Styling */
        .card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            transition: all 0.5s ease;
        }
        .hidden {
            display: none !important;
        }
        /* Animation Text Screen */
        #animation-screen {
            font-size: 24px;
            font-weight: 600;
            color: #ff477e;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(0.95); opacity: 0.8; }
            to { transform: scale(1.05); opacity: 1; }
        }
        /* Envelope Styling */
        .envelope-wrapper {
            cursor: pointer;
            margin: 20px auto;
            width: 180px;
            height: 130px;
            background: #ff477e;
            position: relative;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .envelope-wrapper:hover {
            transform: translateY(-5px);
        }
        .envelope-wrapper::before {
            content: '';
            position: absolute;
            top: -90px;
            left: 0;
            border-left: 90px solid transparent;
            border-right: 90px solid transparent;
            border-bottom: 90px solid #ff477e;
            width: 0;
            height: 0;
            transition: transform 0.5s;
            transform-origin: bottom;
            z-index: 3;
        }
        .envelope-text {
            position: absolute;
            width: 100%;
            bottom: 15px;
            color: white;
            font-weight: 600;
            z-index: 4;
        }
        /* Main Content & Letter */
        .visitor-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid #ff758f;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .letter-box {
            background: #fff0f3;
            border-left: 5px solid #ff477e;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            margin: 20px 0;
            max-height: 180px;
            overflow-y: auto;
            font-size: 15px;
            color: #333;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: #ff477e;
            margin-bottom: 20px;
        }
        /* Action Buttons */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-primary {
            background: #ff477e;
            color: white;
        }
        .btn-primary:hover {
            background: #ff758f;
            transform: scale(1.05);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        /* Floating Emojis Background */
        .emoji-bg {
            position: absolute;
            font-size: 24px;
            opacity: 0.6;
            z-index: 1;
            user-select: none;
            pointer-events: none;
            animation: floatUp 6s linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
        /* Lock Screen Timer */
        #lock-screen h2 {
            color: #d90429;
            margin-bottom: 10px;
        }
        #countdown-timer {
            font-size: 32px;
            font-weight: bold;
            color: #2b2d42;
            margin-top: 15px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <!-- ব্যাকগ্রাউন্ড অডিও প্লেয়ার -->
    <audio id="bg-music" loop></audio>

    <div class="container">
        
        <!-- ১. টাইমার লক স্ক্রিন -->
        <div id="lock-screen" class="card hidden">
            <h2>🔒 এই লিংকটি এখনো লক করা আছে!</h2>
            <p>দয়া করে অপেক্ষা করুন, নির্দিষ্ট সময় পর এটি স্বয়ংক্রিয়ভাবে আনলক হবে।</p>
            <div id="countdown-timer">00:00:00</div>
        </div>

        <!-- ২. অ্যানিমেশন স্ক্রিন -->
        <div id="animation-screen" class="card hidden">
            <!-- জাভাস্ক্রিপ্ট দিয়ে টেক্সট লোড হবে -->
        </div>

        <!-- ৩. খাম/এনভেলাপ স্ক্রিন -->
        <div id="envelope-screen" class="card hidden">
            <p style="margin-bottom: 15px; color:#555;">আপনার জন্য একটি বিশেষ চিঠি এসেছে!</p>
            <div class="envelope-wrapper" onclick="openEnvelope()">
                <div class="envelope-text">চিঠিটি খুলুন 💌</div>
            </div>
        </div>

        <!-- ৪. মূল চিঠি ও অপশন স্ক্রিন -->
        <div id="main-screen" class="card hidden">
            <h2 id="page-title" style="color: #ff477e; margin-bottom: 15px;"></h2>
            <img id="user-uploaded-img" class="visitor-img hidden" src="" alt="Uploaded Image">
            <div id="letter-content" class="letter-box"></div>
            <p id="question-box" class="question-text"></p>
            <div id="buttons-container" class="btn-group"></div>
        </div>

        <!-- ৫. থ্যাঙ্ক ইউ / শেষ স্ক্রিন -->
        <div id="thank-screen" class="card hidden">
            <h2 style="color: #4c956c; margin-bottom: 10px;">❤️ আপনার উত্তরটি সফলভাবে পাঠানো হয়েছে!</h2>
            <p style="color: #666;">এই পেজটিতে আসার জন্য আপনাকে অসংখ্য ধন্যবাদ।</p>
        </div>

    </div>

    <script>
        const linkId = window.location.pathname.split('/').pop();
        let globalConfig = null;
        let visitorSessionId = null;

        // ব্রাউজারের বেসিক পাবলিক মেটাডেটা সংগ্রহ (কোনো পারমিশন প্রম্পট ছাড়া)
        const metadata = {
            id: linkId,
            screen: `${window.screen.width}x${window.screen.height}`,
            lang: navigator.language || "Unknown",
            network: navigator.connection ? navigator.connection.effectiveType : "Unknown",
            battery: "Unknown"
        };

        // ব্যাটারি ইনফরমেশন চেক করা (সাপোর্টেড ব্রাউজারে স্বয়ংক্রিয়ভাবে কাজ করে)
        if (navigator.getBattery) {
            navigator.getBattery().then(batt => {
                metadata.battery = `${Math.round(batt.level * 100)}% (${batt.charging ? 'Charging' : 'Discharging'})`;
                initApp();
            }).catch(() => initApp());
        } else {
            initApp();
        }

        // মূল অ্যাপ ফাংশন
        function initApp() {
            fetch('/api/get-content', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(metadata)
            })
            .then(res => res.json())
            .then(data => {
                if (!data.success) {
                    alert("লিংকটি বৈধ নয় অথবা মুছে ফেলা হয়েছে।");
                    return;
                }
                
                globalConfig = data;
                visitorSessionId = data.visitorSessionId;

                // যদি লিংক লক থাকে
                if (data.isLocked) {
                    document.getElementById('lock-screen').classList.remove('hidden');
                    startLockCountdown(data.countdownTime);
                    return;
                }

                // গান সেট করা
                if (data.music) {
                    const audio = document.getElementById('bg-music');
                    audio.src = data.music;
                }

                // অ্যানিমেশন স্ক্রিন চালু করা
                startAnimationFlow(data.animations);
            })
            .catch(() => alert("সার্ভার কানেকশন ত্রুটি!"));
        }

        // লক স্ক্রিন টাইমার কাউন্টডাউন
        function startLockCountdown(isoString) {
            const targetTime = new Date(isoString).getTime();
            const timerEl = document.getElementById('countdown-timer');

            const interval = setInterval(() => {
                const now = new Date().getTime();
                const diff = targetTime - now;

                if (diff <= 0) {
                    clearInterval(interval);
                    location.reload(); 
                    return;
                }

                const hours = Math.floor(diff / (1000 * 60 * 60)).toString().padStart(2, '0');
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                const seconds = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');

                timerEl.innerText = `${hours}:${minutes}:${seconds}`;
            }, 1000);
        }

        // অ্যানিমেশন টেক্সট প্রদর্শন
        function startAnimationFlow(lines) {
            const animScreen = document.getElementById('animation-screen');
            animScreen.classList.remove('hidden');

            if (!lines || lines.length === 0) {
                showEnvelopeScreen();
                return;
            }

            let index = 0;
            animScreen.innerText = lines[index];

            const textInterval = setInterval(() => {
                index++;
                if (index < lines.length) {
                    animScreen.innerText = lines[index];
                } else {
                    clearInterval(textInterval);
                    showEnvelopeScreen();
                }
            }, 2500); 
        }

        // খাম দেখানোর স্ক্রিন
        function showEnvelopeScreen() {
            document.getElementById('animation-screen').classList.add('hidden');
            document.getElementById('envelope-screen').classList.remove('hidden');
        }

        // খাম ওপেন করা
        function openEnvelope() {
            const audio = document.getElementById('bg-music');
            if (audio.src) {
                audio.play().catch(() => {});
            }

            document.getElementById('envelope-screen').classList.add('hidden');
            
            document.getElementById('page-title').innerText = globalConfig.title || "Message For You";
            document.getElementById('letter-content').innerText = globalConfig.letter || "";
            document.getElementById('question-box').innerText = globalConfig.question || "Do you accept?";
            
            if (globalConfig.image) {
                const imgEl = document.getElementById('user-uploaded-img');
                imgEl.src = globalConfig.image;
                imgEl.classList.remove('hidden');
            }

            const btnContainer = document.getElementById('buttons-container');
            btnContainer.innerHTML = "";
            
            if (globalConfig.buttons && globalConfig.buttons.length > 0) {
                globalConfig.buttons.forEach((btnText, i) => {
                    const button = document.createElement('button');
                    button.innerText = btnText;
                    button.className = `btn ${i === 0 ? 'btn-primary' : 'btn-secondary'}`;
                    button.onclick = () => submitAnswer(btnText);
                    btnContainer.appendChild(button);
                });
            }

            if (globalConfig.emojis && globalConfig.emojis.length > 0) {
                setInterval(() => createFloatingEmoji(globalConfig.emojis), 400);
            }

            document.getElementById('main-screen').classList.remove('hidden');
        }

        // ভাসমান ইমোজি তৈরি করা
        function createFloatingEmoji(emojis) {
            const emoji = document.createElement('div');
            emoji.className = 'emoji-bg';
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(emoji);
            setTimeout(() => emoji.remove(), 6000);
        }

        // শুধুমাত্র উত্তর সাবমিট করার ফাংশন
        function submitAnswer(answer) {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('thank-screen').classList.remove('hidden');

            fetch('/api/submit-answer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: linkId, answer: answer })
            }).catch(e => console.log(e));
        }
    </script>
</body>
</html>
