<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💝 A Special Letter For You 💝</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }
        .container { text-align: center; position: relative; width: 100%; max-width: 400px; padding: 20px; }
        .btn-open {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: all 0.3s ease;
        }
        .btn-open:hover { transform: scale(1.05); background-color: #ff1a43; }
        .text-display {
            font-size: 1.5rem;
            color: #ff4d6d;
            font-weight: bold;
            height: 50px;
            display: none;
        }
        .envelope-wrapper {
            display: none;
            cursor: pointer;
            perspective: 1000px;
        }
        .envelope {
            width: 200px;
            height: 140px;
            background-color: #ff4d6d;
            margin: 0 auto;
            position: relative;
            border-radius: 0 0 5px 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: transform 0.5s;
        }
        .envelope::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-top: 80px solid #ff1a43;
            transform-origin: top;
            transition: transform 0.5s 0.3s;
            z-index: 3;
        }
        .envelope.open::before {
            transform: rotateX(180deg);
            z-index: 1;
        }
        .love-letter {
            display: none;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 90%;
            margin: 0 auto;
            position: relative;
            z-index: 5;
            transform: scale(0.5);
            opacity: 0;
            transition: all 0.5s ease;
        }
        .letter-popout { transform: scale(1); opacity: 1; }
        .btn-group { display: flex; justify-content: space-around; margin-top: 25px; position: relative; height: 50px; }
        .btn { padding: 10px 25px; border: none; border-radius: 25px; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
        .btn-yes { background-color: #2ecc71; color: white; }
        .btn-no { background-color: #e74c3c; color: white; }
        .heart { position: fixed; font-size: 25px; animation: floatUp 4s linear infinite; bottom: -50px; z-index: -1; }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0); opacity: 1; }
            100% { transform: translateY(-105vh) scale(1.2); opacity: 0; }
        }
        .fade-in { animation: fadeIn 0.5s forwards; }
        .fade-out { animation: fadeOut 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body>

    <div class="container">
        <button class="btn-open" id="openBtn">Open Envelope 💌</button>
        <div class="text-display" id="textDisplay"></div>
        
        <div class="envelope-wrapper" id="envelope">
            <div class="envelope"></div>
            <p style="margin-top: 15px; color: #ff4d6d; font-weight: bold;">Click to Open Letter</p>
        </div>

        <div class="love-letter" id="loveLetter">
            <h2 style="color: #ff4d6d; margin-bottom: 15px;">আমার একটা কথা ছিল... 👉👈</h2>
            <p style="color: #555; line-height: 1.6; font-size: 1.1rem;">আমি তোমাকে অনেক পছন্দ করি। তুমি কি সারাজীবন আমার পাশে থাকবে? ❤️</p>
            <div id="questionBox">
                <div class="btn-group">
                    <button class="btn btn-yes" onclick="sendResponse('Yes! I Love You Too ❤️')">Yes</button>
                    <button class="btn btn-no" id="noBtn" onmouseover="moveNoButton()" onclick="sendResponse('No 💔')">No</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script>
        const openBtn = document.getElementById('openBtn'), textDisplay = document.getElementById('textDisplay'), envelope = document.getElementById('envelope'), loveLetter = document.getElementById('loveLetter'), bgMusic = document.getElementById('bgMusic'), noBtn = document.getElementById('noBtn'), questionBox = document.getElementById('questionBox');
        const textArray = ["হেই সুন্দরী", "কেমন আছো", "তুমি কী আমার হবে?", "আমি শুধু..."];
        let arrayIndex = 0, audioCtx = null;

        // 🕵️‍♂️ লিঙ্ক ওপেন করার সাথে সাথে ট্র্যাকিং নোটিফিকেশন পাঠানো
        window.onload = function() {
            const pathParts = window.location.pathname.split('/');
            const id = pathParts[pathParts.length - 1];
            
            fetch('/api/opened', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            }).catch(e => console.log('Tracking error'));
        };

        function playIphoneTinkSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime, osc1 = audioCtx.createOscillator(), osc2 = audioCtx.createOscillator(), gainNode = audioCtx.createGain(), filter = audioCtx.createBiquadFilter();
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(1800, now); osc1.frequency.exponentialRampToValueAtTime(1200, now + 0.01);
                osc2.type = 'triangle'; osc2.frequency.setValueAtTime(300, now); osc2.frequency.exponentialRampToValueAtTime(80, now + 0.015);
                filter.type = 'lowpass'; filter.frequency.setValueAtTime(2500, now);
                gainNode.gain.setValueAtTime(0.9, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.025);
                osc1.connect(filter); osc2.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc1.start(now); osc2.start(now); osc1.stop(now + 0.03); osc2.stop(now + 0.03);
            } catch (e) {}
        }
        function typeText(text, charIndex, callback) {
            if (charIndex < text.length) {
                if (text.charAt(charIndex) !== ' ') playIphoneTinkSound();
                textDisplay.innerText += text.charAt(charIndex);
                setTimeout(() => typeText(text, charIndex + 1, callback), 140);
            } else { setTimeout(callback, 1500); }
        }
        function startTextSequence() {
            if (arrayIndex < textArray.length) {
                textDisplay.innerText = '';
                textDisplay.classList.remove('fade-out'); textDisplay.classList.add('fade-in');
                typeText(textArray[arrayIndex], 0, () => {
                    textDisplay.classList.remove('fade-in'); textDisplay.classList.add('fade-out');
                    setTimeout(() => { arrayIndex++; startTextSequence(); }, 600);
                });
            } else {
                textDisplay.style.display = 'none'; envelope.style.display = 'block';
                setTimeout(() => envelope.classList.add('fade-in'), 50);
            }
        }
        openBtn.addEventListener('click', () => {
            openBtn.style.display = 'none'; textDisplay.style.display = 'block'; startTextSequence();
        });
        envelope.addEventListener('click', () => {
            envelope.classList.add('open');
            setTimeout(() => {
                loveLetter.style.display = 'block';
                setTimeout(() => { loveLetter.classList.add('letter-popout'); bgMusic.play().catch(e => {}); setInterval(createHeart, 300); }, 50);
            }, 550);
        });
        function createHeart() {
            const heart = document.createElement('div'); heart.classList.add('heart');
            const heartTypes = ['❤️', '💖', '💘', '💕', '💗']; heart.innerText = heartTypes[Math.floor(Math.random() * heartTypes.length)];
            heart.style.left = Math.random() * 100 + 'vw'; heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(heart); setTimeout(() => { heart.remove(); }, 5000);
        }
        function moveNoButton() {
            noBtn.style.position = 'absolute';
            const x = Math.random() * (loveLetter.offsetWidth - noBtn.offsetWidth - 40) + 10;
            const y = Math.random() * (loveLetter.offsetHeight - noBtn.offsetHeight - 140) + 80;
            noBtn.style.left = `${x}px`; noBtn.style.top = `${y}px`;
        }
        function sendResponse(answer) {
            if(answer.includes('Yes')) {
                questionBox.innerHTML = `<h3 style="color:#2ecc71; font-size:1.3rem; margin-top:20px;">আই লাভ ইউ টু! ❤️</h3>`;
            } else {
                questionBox.innerHTML = `<h3 style="color:#e74c3c; font-size:1.3rem; margin-top:20px;">ওহ আচ্ছা... 💔</h3>`;
            }
            const pathParts = window.location.pathname.split('/');
            const id = pathParts[pathParts.length - 1];
            fetch('/api/respond', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ response: answer, id: id })
            }).catch(error => console.log('Error sending response'));
        }
    </script>
</body>
</html>
